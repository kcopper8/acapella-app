<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="아카펠라 메이커">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="아카펠라 메이커">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>아카펠라 메이커</title>
  <link rel="manifest" href="manifest.json">

  <!-- Cross-Origin Isolation (SharedArrayBuffer 활성화) -->
  <script>
    if (!crossOriginIsolated) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/coi-serviceworker.js').then(function(reg) {
          if (reg.active && !navigator.serviceWorker.controller) {
            window.location.reload();
          }
        });
      }
    }
  </script>

  <!-- ffmpeg.wasm v0.11 -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

  <script>
    let ffmpegInstance = null;

    window.initFFmpeg = async function() {
      if (ffmpegInstance) return true;
      try {
        const { createFFmpeg } = FFmpeg;
        ffmpegInstance = createFFmpeg({
          log: true,
          corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
        });
        await ffmpegInstance.load();
        console.log('[FFmpeg] 초기화 완료');
        return true;
      } catch(e) {
        console.error('[FFmpeg] 초기화 실패:', e);
        return false;
      }
    };

    window.mergeVideosToGrid = async function(videoUrls) {
      if (!ffmpegInstance) {
        const ok = await window.initFFmpeg();
        if (!ok) return null;
      }
      const { fetchFile } = FFmpeg;
      const ffmpeg = ffmpegInstance;

      try {
        const n = videoUrls.length;
        if (n === 1) return videoUrls[0];

        for (let i = 0; i < n; i++) {
          ffmpeg.FS('writeFile', 'input' + i + '.webm', await fetchFile(videoUrls[i]));
        }

        let filterComplex, mapArgs;
        if (n === 2) {
          filterComplex = '[0:v]scale=640:480[v0];[1:v]scale=640:480[v1];[v0][v1]hstack=inputs=2[v];[0:a][1:a]amix=inputs=2[a]';
          mapArgs = ['-map', '[v]', '-map', '[a]'];
        } else {
          const scales = Array.from({length: n}, (_, i) => '[' + i + ':v]scale=320:240[v' + i + ']').join(';');
          const stack = Array.from({length: n}, (_, i) => '[v' + i + ']').join('');
          const layout = n === 3 ? '0_0|w0_0|0_h0' : '0_0|w0_0|0_h0|w0_h0';
          const audioMix = Array.from({length: n}, (_, i) => '[' + i + ':a]').join('');
          filterComplex = scales + ';' + stack + 'xstack=inputs=' + n + ':layout=' + layout + '[v];' + audioMix + 'amix=inputs=' + n + '[a]';
          mapArgs = ['-map', '[v]', '-map', '[a]'];
        }

        const inputs = Array.from({length: n}, (_, i) => ['-i', 'input' + i + '.webm']).flat();
        await ffmpeg.run(...inputs, '-filter_complex', filterComplex, ...mapArgs, 'output.mp4');

        const data = ffmpeg.FS('readFile', 'output.mp4');
        const blob = new Blob([data.buffer], { type: 'video/mp4' });
        return URL.createObjectURL(blob);
      } catch(e) {
        console.error('[FFmpeg] 합치기 실패:', e);
        return null;
      }
    };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
